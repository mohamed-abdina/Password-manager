<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Password Manager</h1>
            <p class="subtitle">Securely store and manage your passwords</p>
        </header>

        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="Search passwords..." autocomplete="off">
            <button id="addBtn" class="btn btn-primary">+ Add Password</button>
        </div>

        <div id="passwordList" class="password-list">
            <p class="empty-state">No passwords saved yet. Click "Add Password" to get started.</p>
        </div>

        <div id="stats" class="stats"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Password</h2>
                <button id="modalClose" class="modal-close">&times;</button>
            </div>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="formName">Website / App Name</label>
                    <input type="text" id="formName" required placeholder="e.g. github.com">
                </div>
                <div class="form-group">
                    <label for="formUsername">Username / Email</label>
                    <input type="text" id="formUsername" required placeholder="e.g. user@example.com">
                </div>
                <div class="form-group">
                    <label for="formPassword">Password</label>
                    <div class="password-input-group">
                        <input type="password" id="formPassword" required placeholder="Enter password">
                        <button type="button" id="togglePassword" class="btn-icon" title="Show/Hide">&#128065;</button>
                        <button type="button" id="generateBtn" class="btn-icon" title="Generate password">&#128273;</button>
                    </div>
                </div>
                <div id="strengthIndicator" class="strength-indicator"></div>
                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
